server {
    # Cloud Run expects the container to listen on the PORT environment variable.
    # Nginx config can be a bit tricky with dynamic variables, but listening on 8080 
    # (which is the default Cloud Run port) is standard practice.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Important for React Router (Single Page Application)
    # If a file isn't found, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
